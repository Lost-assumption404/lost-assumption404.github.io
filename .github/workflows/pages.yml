name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A17918: ${{ secrets.A17918 }}
          B1A01C: ${{ secrets.B1A01C }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A17918', '')
          bm = os.environ.get('B1A01C', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- eff2fba7fe1cc503c5b5f07568d5ded40df97b3baf88e954 -->', gm)
              s2 = s2.replace('<!-- a4fdda9346da97daa1e666ee63ff9db81655867456cfd4 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
